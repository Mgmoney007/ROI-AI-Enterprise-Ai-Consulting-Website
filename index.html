
<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROI-AI | Turn AI into Operating Leverage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #030303;
            color: #ffffff;
            overflow-x: hidden;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        /* Custom Utilities */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .text-gradient {
            background: linear-gradient(135deg, #fff 0%, #3b82f6 33%, #10b981 66%, #ec4899 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .accent-glow {
            box-shadow: 0 0 40px -10px rgba(59, 130, 246, 0.4);
        }
        
        /* Micro-animations */
        @keyframes subtle-float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: subtle-float 6s ease-in-out infinite; }
        
        .animate-gradient-text {
            background: linear-gradient(to right, #3b82f6, #10b981, #f87171, #3b82f6);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-flow 4s linear infinite;
        }

        @keyframes gradient-flow {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }
        
        @keyframes energy-beam {
            0% { transform: translateY(-100%) scaleY(0.5); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(100%) scaleY(1.5); opacity: 0; }
        }
        .beam {
            position: absolute;
            width: 2px;
            height: 400px;
            background: linear-gradient(to bottom, transparent, #10b981, transparent);
            animation: energy-beam 8s linear infinite;
        }

        /* Responsive fixes for Tailwind */
        @media (max-width: 640px) {
            .hero-title { font-size: 2.5rem !important; line-height: 1.1; }
        }
    </style>
